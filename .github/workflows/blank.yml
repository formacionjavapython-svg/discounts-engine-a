name: Java CI Pipeline

on:
  push:
    branches: [ 'ruben-diaz-ordonez' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create build directory
      run: mkdir -p build

    - name: Compile Java source files
      run: |
        javac -d build discounts/src/**/*.java
    - name: Run CheckStyle validation
      run: |
        bash discounts/scripts/checkstyke.sh
    - name: Run Tests
      run: |
        cd build
        java -cp . test.TestCasero
      env:
        DISCOUNT_COUPON_SECRET: ${{ secrets.SUPER2024 }}

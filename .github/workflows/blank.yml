name: Java CI - Discount Engine

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-quality:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

  
      - name: Compilar proyecto
        run: |
          mkdir -p out
          javac -d out $(find src/main/java -name "*.java")

   
      - name: Ejecutar tests (Main)
        env:
          DISCOUNT_COUPON_SECRET: SUPER2024
        run: |
          java -cp out Main

      - name: Descargar Checkstyle
        run: |
          curl -L -o checkstyle.jar \
          https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

      - name: Ejecutar Checkstyle
        run: |
          java -jar checkstyle.jar -c checkstyle.xml src/main/java

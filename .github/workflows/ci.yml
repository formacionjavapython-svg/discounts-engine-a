name: Discount Engine CI/CD

on:
  push:
    branches: [ main, iassiel-navih-meneses-gomez ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  DISCOUNT_COUPON_SECRET: ${{ secrets.DISCOUNT_COUPON_SECRET }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Verify Java version
        run: java -version

      - name: Compile source code
        run: |
          echo "=== Compilando codigo fuente ==="
          javac -d out/classes src/main/java/*.java
          echo "Compilacion exitosa"

      - name: Compile tests
        run: |
          echo "=== Compilando tests ==="
          javac -cp out/classes -d out/test-classes src/test/java/*.java
          echo "Tests compilados"

      - name: Run tests
        env:
          DISCOUNT_COUPON_SECRET: ${{ secrets.DISCOUNT_COUPON_SECRET }}
        run: |
          echo "=== Ejecutando TestRunner ==="
          java -cp out/classes:out/test-classes TestRunner | tee test-report.txt
          echo "Tests completados"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.txt

  checkstyle:
    name: Checkstyle Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Checkstyle
        run: |
          CHECKSTYLE_VERSION="10.21.4"
          CHECKSTYLE_JAR="checkstyle-${CHECKSTYLE_VERSION}-all.jar"
          curl -L -o "$CHECKSTYLE_JAR" \
            "https://github.com/checkstyle/checkstyle/releases/download/checkstyle-${CHECKSTYLE_VERSION}/${CHECKSTYLE_JAR}"
          java -jar "$CHECKSTYLE_JAR" -c checkstyle.xml src/main/java/ | tee checkstyle-report.txt

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: checkstyle-report.txt

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

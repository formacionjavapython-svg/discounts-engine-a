name: Java CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with javac
        run: |
          mkdir -p out
          javac -d out -cp "src/main/java:src/test/java" src/main/java/**/*.java src/test/java/**/*.java

      - name: Ejecutar Checkstyle (Calidad)
        run: |
          chmod +x scripts/checkstyle.sh
          bash scripts/checkstyle.sh || echo "Checkstyle encontró detalles, pero el proceso sigue."

      - name: Ejecutar TestRunner (Pruebas Unitarias)
        env:
          DISCOUNT_COUPON_SECRET: ${{ secrets.DISCOUNT_COUPON_SECRET }}
        run: |
          java -cp out test.TestRunner
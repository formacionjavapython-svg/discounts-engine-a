name: Java CI Pipeline

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with javac
        run: |
          mkdir -p out
          javac -d out src/main/java/objetosDescuento/*.java src/main/java/test/TestRunner.java

      - name: Run Custom TestRunner
        env:
          DISCOUNT_COUPON_SECRET: PROMO2026
        run: |
          java -cp out test.TestRunner > test-report.txt
          cat test-report.txt

      - name: Check Quality with Checkstyle
        run: |
          curl -L -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar
          java -jar checkstyle.jar -c checkstyle.xml src/ > checkstyle-result.txt || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports
          path: |
            test-report.txt
            checkstyle-result.txt